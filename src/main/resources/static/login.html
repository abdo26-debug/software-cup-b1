<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ChinaSoftCup</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: #12121a;
      --border: #1e1e2e;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --input-bg: #1a1a26;
      --success: #4ade80;
      --error: #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 3s; }
    .orb3 { width: 200px; height: 200px; background: #00d4ff; top: 50%; left: 60%; animation-delay: 6s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, 20px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 560px;
      margin: 24px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 40px 120px rgba(0,0,0,0.6);
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Left decorative panel */
    .side-panel {
      flex: 1;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .side-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236c63ff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
    }

    .side-content {
      position: relative;
    }

    .side-content h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #fff;
    }

    .side-content p {
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .decorative-shape {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 180px;
      height: 180px;
      border: 2px solid rgba(108, 99, 255, 0.2);
      border-radius: 40px;
      transform: translateY(-50%) rotate(15deg);
    }

    .decorative-shape2 {
      position: absolute;
      right: -30px;
      top: 45%;
      width: 120px;
      height: 120px;
      border: 1px solid rgba(255, 101, 132, 0.15);
      border-radius: 30px;
      transform: translateY(-50%) rotate(-10deg);
    }

    /* Right form panel */
    .form-panel {
      flex: 1.1;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 44px;
    }

    .form-header {
      margin-bottom: 36px;
    }

    .form-header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .form-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .form-header p a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .form-header p a:hover { text-decoration: underline; }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px 13px 42px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }

    input::placeholder { color: #3a3a50; }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: flex;
      align-items: center;
    }

    .toggle-password:hover { color: var(--text); }

    .forgot {
      text-align: right;
      margin-top: 6px;
    }

    .forgot a {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot a:hover { color: var(--accent); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      background: #7c74ff;
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
      transform: translateY(-1px);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .alert.error { background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .alert.success { background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
    .alert.show { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 640px) {
      .side-panel { display: none; }
      .form-panel { padding: 36px 28px; }
      .container { margin: 16px; }
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="container">
  <!-- Left panel -->
  <div class="side-panel">
    <div class="brand">
      <div class="brand-dot"></div>
      SoftCup
    </div>
    <div class="side-content">
      <h2>Welcome back to the platform</h2>
      <p>Sign in to access your dashboard, manage projects, and collaborate with your team.</p>
    </div>
    <p style="color: rgba(255,255,255,0.2); font-size:0.8rem;">China Software Cup © 2026</p>
    <div class="decorative-shape"></div>
    <div class="decorative-shape2"></div>
  </div>

  <!-- Right form panel -->
  <div class="form-panel">
    <div class="form-header">
      <h1>Sign in</h1>
      <p>Don't have an account? <a href="signup.html">Create one</a></p>
    </div>

    <div class="alert error" id="alertBox">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span id="alertMsg"></span>
    </div>

    <div class="form-group">
      <label>Email address</label>
      <div class="input-wrap">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="toggle-password" type="button" onclick="togglePassword('password', this)">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <span id="btnText">Sign in</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>
</div>

<script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alertBox');
    const msgEl = document.getElementById('alertMsg');
    box.className = `alert ${type} show`;
    msgEl.textContent = msg;
  }

  function hideAlert() {
    document.getElementById('alertBox').classList.remove('show');
  }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');

    hideAlert();

    if (!email || !password) {
      showAlert('Please fill in all fields.');
      return;
    }

    // Loading state
    btn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';

    try {
      const response = await fetch('http://localhost:8080/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (data.success) {
        showAlert('Login successful! Redirecting...', 'success');
        // Save user info
        localStorage.setItem('user', JSON.stringify({
          name: data.name,
          role: data.role,
          id: data.id
        }));
        // Redirect after short delay
        setTimeout(() => {
          alert('Role received: ' + data.role);
const role = (data.role || '').toLowerCase();
if (role === 'teacher') {
  window.location.href = 'teacher-dashboard.html';
} else {
  window.location.href = 'student-dashboard.html';
}
        }, 1200);
      } else {
        showAlert(data.message || 'Login failed. Please try again.');
      }
    } catch (err) {
      showAlert('Cannot connect to server. Make sure the backend is running.');
    } finally {
      btn.disabled = false;
      btnText.style.display = 'block';
      spinner.style.display = 'none';
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
